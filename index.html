<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7heGodFamilia Links | Legacy 🧿</title>
    
    <link rel="icon" type="image/png" href="https://7hegodfamilia.com/favicon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030304;
            --accent: #a78bfa;
            --gold: #f59e0b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            /* Senior Gradient: Deep Blue/Purple vibe */
            background-image: radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, #0f172a 0%, transparent 40%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 550px; /* Ιδανικό για Tablet & PC */
            text-align: center;
        }

        .profile { margin-bottom: 35px; }

        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(167, 139, 250, 0.4);
            object-fit: contain;
            background: rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .tagline { color: var(--gold); font-size: 0.9rem; margin-top: 8px; font-weight: 600; letter-spacing: 1px; }

        .links-list {
            display: flex; flex-direction: column; gap: 14px;
        }

        .link-item {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            text-decoration: none;
            color: white;
            display: flex; align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-item i {
            font-size: 1.4rem;
            width: 35px;
            text-align: center;
            margin-right: 15px;
        }

        .link-text { font-size: 1rem; font-weight: 600; flex-grow: 1; text-align: left; }

        /* Hover Effects per Brand */
        .link-item:hover { transform: scale(1.02); background: rgba(255,255,255,0.1); border-color: white; }
        
        .twitch:hover { border-color: #9146ff; color: #9146ff; }
        .discord:hover { border-color: #5865f2; color: #5865f2; }
        .tiktok:hover { border-color: #ff0050; color: #ff0050; }
        .insta:hover { border-color: #e1306c; color: #e1306c; }
        .fb:hover { border-color: #1877f2; color: #1877f2; }
        .yt:hover { border-color: #ff0000; color: #ff0000; }
        .web:hover { border-color: var(--accent); color: var(--accent); }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
        }
        .footer strong { color: var(--accent); }
        .mati-icon { font-size: 1.2rem; display: block; margin-top: 10px; color: var(--accent); }

        /* Tablet & PC adjustments */
        @media (min-width: 768px) {
            h1 { font-size: 2.2rem; }
            .link-text { font-size: 1.1rem; }
            .avatar { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://7hegodfamilia.com/favicon.png" alt="7heGodFamilia" class="avatar">
            <h1>7heGodFamilia</h1>
            <div class="tagline">The Energy of Thessaloniki 🧿</div>
        </div>

        <div class="links-list">
            <a href="https://7hegodfamilia.com" class="link-item web">
                <i class="fa-solid fa-globe"></i>
                <span class="link-text">Official Website</span>
            </a>

            <a href="https://www.twitch.tv/7he_godfamilia" class="link-item twitch">
                <i class="fa-brands fa-twitch"></i>
                <span class="link-text">Twitch Live</span>
            </a>

            <a href="https://discord.com/invite/d6dYxWP" class="link-item discord">
                <i class="fa-brands fa-discord"></i>
                <span class="link-text">Discord Server</span>
            </a>

            <a href="https://www.tiktok.com/@7he_godfamilia" class="link-item tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span class="link-text">TikTok @7he_godfamilia</span>
            </a>

            <a href="https://www.instagram.com/7he_godfamilia" class="link-item insta">
                <i class="fa-brands fa-instagram"></i>
                <span class="link-text">Instagram</span>
            </a>

            <a href="https://www.facebook.com/7heGodFamilia" class="link-item fb">
                <i class="fa-brands fa-facebook"></i>
                <span class="link-text">Facebook Page</span>
            </a>

            <a href="https://www.youtube.com/channel/UCM4nJvoBgaR9KXTRlQHpR8g" class="link-item yt">
                <i class="fa-brands fa-youtube"></i>
                <span class="link-text">YouTube Channel</span>
            </a>
        </div>

        <div class="footer">
            Developed with ❤️ by <strong>Βασίλης (7Keyz Beatz)</strong><br>
            &copy; 2026 7heGodFamilia Legacy | Stay Focused
            <span class="mati-icon">🧿</span>
        </div>
    </div>

</body>
</html>
