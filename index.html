<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7heGodFamilia Links</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --accent: #a78bfa;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
        }

        h1 { font-size: 1.5rem; margin: 0; letter-spacing: 1px; }
        p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 5px; }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Brand Colors for Hover */
        .twitch:hover { border-color: #9146ff; box-shadow: 0 0 15px rgba(145, 70, 255, 0.2); }
        .discord:hover { border-color: #5865f2; box-shadow: 0 0 15px rgba(88, 101, 242, 0.2); }
        .insta:hover { border-color: #e1306c; box-shadow: 0 0 15px rgba(225, 48, 108, 0.2); }
        .youtube:hover { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="profile">
        <img src="https://7hegodfamilia.com/favicon.png" alt="7heGodFamilia" class="avatar">
        <h1>7heGodFamilia</h1>
        <p>The Energy of Thessaloniki 🧿</p>
    </div>

    <div class="links-container">
        <a href="https://7hegodfamilia.com" class="link-card">Official Website</a>
        <a href="https://www.twitch.tv/7he_godfamilia" class="link-card twitch">Twitch Live</a>
        <a href="https://discord.com/invite/d6dYxWP" class="link-card discord">Discord Server</a>
        <a href="https://www.instagram.com/7he_godfamilia" class="link-card insta">Instagram</a>
        <a href="https://www.youtube.com/channel/UCM4nJvoBgaR9KXTRlQHpR8g" class="link-card youtube">YouTube Channel</a>
    </div>

    <div class="footer">
        Developed with ❤️ by Βασίλης (7Keyz Beatz)<br>
        &copy; 2026 7heGodFamilia Legacy
    </div>

</body>
</html>
